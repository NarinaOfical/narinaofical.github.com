<style>
body { background:#111; color:#fff; font-family:sans-serif; }
#controls { width:300px; float:left; }
#canvas { border:1px solid #444; }
input, select { width:100%; margin-bottom:5px; }
button { width:100%; margin-top:5px; }
.effect { border:1px solid #333; padding:5px; margin-bottom:10px; }
</style>
</head>

<body>

<div id="controls">
<input type="file" id="upload" accept="image/*,video/*">
<select id="effectSelect"></select>
<button onclick="addEffect()">Add Effect</button>
<div id="effects"></div>
<button onclick="exportImage()">Export Image</button>
<button onclick="exportVideo()">Export WebM</button>
</div>

<canvas id="canvas" width="800" height="450"></canvas>

<script>
var seriously = new Seriously();
var target = seriously.target('#canvas');
var source;
var nodes = [];

var effectsList = Object.keys(Seriously.effects());
var select = document.getElementById('effectSelect');
effectsList.forEach(e => {
    var opt = document.createElement('option');
    opt.value = e;
    opt.textContent = e;
    select.appendChild(opt);
});

document.getElementById('upload').onchange = function(e) {
    var file = e.target.files[0];
    var url = URL.createObjectURL(file);

    if (file.type.startsWith('video')) {
        var video = document.createElement('video');
        video.src = url;
        video.loop = true;
        video.muted = true;
        video.play();
        source = seriously.source(video);
    } else {
        var img = new Image();
        img.onload = function() {
            source = seriously.source(img);
        };
        img.src = url;
    }
};

function rebuildChain() {
    if (!source) return;

    var current = source;

    nodes.forEach(n => {
        n.node.source = current;
        current = n.node;
    });

    target.source = current;
    seriously.go();
}

function addEffect() {
    var type = select.value;
    var node = seriously.effect(type);
    var container = document.createElement('div');
    container.className = 'effect';

    var title = document.createElement('div');
    title.textContent = type;
    container.appendChild(title);

    var inputs = node.inputs;

    Object.keys(inputs).forEach(key => {
        var input = inputs[key];
        if (input.type === 'image') return;

        var el;

        if (input.type === 'enum') {
            el = document.createElement('select');
            input.options.forEach(o => {
                var op = document.createElement('option');
                op.value = o;
                op.textContent = o;
                el.appendChild(op);
            });
        } else if (input.type === 'boolean') {
            el = document.createElement('input');
            el.type = 'checkbox';
        } else if (input.type === 'color') {
            el = document.createElement('input');
            el.type = 'color';
        } else {
            el = document.createElement('input');
            el.type = 'range';
            el.min = input.min || 0;
            el.max = input.max || 1;
            el.step = input.step || 0.01;
            el.value = input.defaultValue || 0;
        }

        el.oninput = function() {
            if (input.type === 'boolean') {
                node[key] = el.checked;
            } else {
                node[key] = el.value;
            }
        };

        container.appendChild(el);
    });

    var removeBtn = document.createElement('button');
    removeBtn.textContent = 'Remove';
    removeBtn.onclick = function() {
        nodes = nodes.filter(n => n.node !== node);
        container.remove();
        rebuildChain();
    };

    container.appendChild(removeBtn);
    document.getElementById('effects').appendChild(container);

    nodes.push({ node: node });
    rebuildChain();
}

function exportImage() {
    var canvas = document.getElementById('canvas');
    var link = document.createElement('a');
    link.download = 'output.png';
    link.href = canvas.toDataURL();
    link.click();
}

function exportVideo() {
    var canvas = document.getElementById('canvas');
    var stream = canvas.captureStream(30);
    var recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
    var chunks = [];

    recorder.ondataavailable = e => chunks.push(e.data);
    recorder.onstop = () => {
        var blob = new Blob(chunks, { type: 'video/webm' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'output.webm';
        a.click();
    };

    recorder.start();
    setTimeout(() => recorder.stop(), 5000);
}
</script>

</body>
</html>

<div id="controls">
<input type="file" id="upload" accept="image/*,video/*">
<select id="effectSelect">
<option value="kaleidoscope">Kaleidoscope</option>
<option value="tile">Tile</option>

  <option value="sepia">Sepia</option>
  <option value="tone">Tone</option>
  <option value="tvglitch">Bad TV</option>
  <option value="sketch">Sketch</option>
</select>
<button id="addEffect">Add Effect</button>
<div id="effects"></div>
<button id="exportImage">Export Image</button>
<button id="exportVideo">Export WebM</button>
</div>

<div id="viewer">
<video id="video" autoplay loop muted playsinline></video>
<img id="image">
<canvas id="canvas"></canvas>
</div>

<script>
const seriously=new Seriously();
let sourceNode=null;
let target=seriously.target('#canvas');
let chain=[];
const upload=document.getElementById('upload');
const video=document.getElementById('video');
const image=document.getElementById('image');

upload.onchange=e=>{
const file=e.target.files[0];
if(!file)return;
const url=URL.createObjectURL(file);
if(file.type.startsWith('video')){
video.src=url;
video.style.display='block';
image.style.display='none';
sourceNode=seriously.source(video);
}else{
image.src=url;
image.onload=()=>{
image.style.display='block';
video.style.display='none';
sourceNode=seriously.source(image);
connectChain();
};
}
};

function connectChain(){
let prev=sourceNode;
chain.forEach(e=>{e.node.source=prev;prev=e.node});
target.source=prev;
seriously.go();
}

document.getElementById('addEffect').onclick=()=>{
const type=document.getElementById('effectSelect').value;
const node=seriously.effect(type);
const wrapper=document.createElement('div');
wrapper.className='effect';

const removeBtn=document.createElement('button');
removeBtn.textContent='Remove';
removeBtn.onclick=()=>{
chain=chain.filter(e=>e.node!==node);
wrapper.remove();
connectChain();
};
wrapper.appendChild(removeBtn);

const inputs=Seriously.effects()[type].inputs;

Object.keys(inputs).forEach(key=>{
const input=inputs[key];
let el;

if(input.type==='number'){
el=document.createElement('input');
el.type='range';
el.min=input.min||0;
el.max=input.max||1;
el.step=input.step||0.01;
el.value=input.defaultValue||0;
el.oninput=()=>node[key]=parseFloat(el.value);
}

if(input.type==='boolean'){
el=document.createElement('input');
el.type='checkbox';
el.onchange=()=>node[key]=el.checked;
}

if(input.type==='enum'){
el=document.createElement('select');
input.options.forEach(opt=>{
const o=document.createElement('option');
o.value=opt;
o.textContent=opt;
el.appendChild(o);
});
el.onchange=()=>node[key]=el.value;
}

if(input.type==='color'){
el=document.createElement('input');
el.type='color';
el.oninput=()=>node[key]=el.value;
}

if(el){
const label=document.createElement('label');
label.textContent=key;
wrapper.appendChild(label);
wrapper.appendChild(el);
}
});

document.getElementById('effects').appendChild(wrapper);
chain.push({node,type});
connectChain();
};

document.getElementById('exportImage').onclick=()=>{
const link=document.createElement('a');
link.download='output.png';
link.href=document.getElementById('canvas').toDataURL();
link.click();
};

document.getElementById('exportVideo').onclick=()=>{
const canvas=document.getElementById('canvas');
const stream=canvas.captureStream(30);
const recorder=new MediaRecorder(stream,{mimeType:'video/webm'});
let chunks=[];
recorder.ondataavailable=e=>chunks.push(e.data);
recorder.onstop=()=>{
const blob=new Blob(chunks,{type:'video/webm'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');
a.href=url;
a.download='output.webm';
a.click();
};
recorder.start();
setTimeout(()=>recorder.stop(),5000);
};
</script>

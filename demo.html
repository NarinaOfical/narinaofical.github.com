<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Seriously.js Full Editor</title>
<style>
body { margin:0; background:#111; color:#fff; font-family:sans-serif; }
#ui { position:fixed; top:0; left:0; width:300px; bottom:0; overflow:auto; background:#222; padding:10px; }
#canvas { position:absolute; left:300px; top:0; }
button, input, select { width:100%; margin:4px 0; }
.effect { border:1px solid #444; padding:5px; margin-bottom:6px; }
</style>
</head>
<body>

<div id="ui">
<input type="file" id="upload" accept="image/*,video/*">
<button id="addEffect">Add Effect</button>
<button id="exportImg">Export Image</button>
<button id="exportWebm">Export WebM</button>
<div id="effects"></div>
</div>

<canvas id="canvas"></canvas>

<script src="seriously.js"></script>

<script src="effects/kaleidoscope.js"></script>
<script src="effects/tile.js"></script>
<script src="effects/fliplayer.js"></script>
<script src="effects/chromaticabberation.js"></script>
<script src="effects/rays.js"></script>
<script src="effects/lightrays.js"></script>
<script src="effects/swirl.js"></script>
<script src="effects/rgbsplit.js"></script>
<script src="effects/seriously.huesat.js"></script>
<script src="effects/wavewarp.js"></script>

<script src="effects/seriously.ascii.js"></script>
<script src="effects/seriously.bleach-bypass.js"></script>
<script src="effects/seriously.blend.js"></script>
<script src="effects/seriously.brightness-contrast.js"></script>
<script src="effects/seriously.checkerboard.js"></script>
<script src="effects/seriously.chroma.js"></script>
<script src="effects/seriously.color.js"></script>
<script src="effects/seriously.colorcomplements.js"></script>
<script src="effects/seriously.color-select.js"></script>
<script src="effects/seriously.temperature.js"></script>
<script src="effects/seriously.daltonize.js"></script>
<script src="effects/seriously.dither.js"></script>
<script src="effects/seriously.edge.js"></script>
<script src="effects/seriously.emboss.js"></script>
<script src="effects/seriously.exposure.js"></script>
<script src="effects/seriously.falsecolor.js"></script>
<script src="effects/seriously.freeze.js"></script>
<script src="effects/seriously.highlights-shadows.js"></script>
<script src="effects/seriously.kaleidoscope.js"></script>
<script src="effects/seriously.lumakey.js"></script>
<script src="effects/seriously.fader.js"></script>
<script src="effects/seriously.filmgrain.js"></script>
<script src="effects/seriously.blur.js"></script>
<script src="effects/seriously.hue-saturation.js"></script>
<script src="effects/seriously.hex.js"></script>
<script src="effects/seriously.invert.js"></script>
<script src="effects/seriously.directionblur.js"></script>
<script src="effects/seriously.nightvision.js"></script>
<script src="effects/seriously.noise.js"></script>
<script src="effects/seriously.opticalflow.js"></script>
<script src="effects/seriously.pixelate.js"></script>
<script src="effects/seriously.polar.js"></script>
<script src="effects/seriously.ripple.js"></script>
<script src="effects/seriously.scanlines.js"></script>
<script src="effects/seriously.sepia.js"></script>
<script src="effects/seriously.sketch.js"></script>
<script src="effects/seriously.throttle.js"></script>
<script src="effects/seriously.tone.js"></script>
<script src="effects/seriously.tvglitch.js"></script>
<script src="effects/seriously.vibrance.js"></script>
<script src="effects/seriously.vignette.js"></script>
<script src="effects/seriously.split.js"></script>

<script>
const seriously = new Seriously();
const canvas = document.getElementById('canvas');
const target = seriously.target(canvas);

let sourceNode = null;
let chain = [];

function resize(w,h){
 canvas.width = w;
 canvas.height = h;
}

document.getElementById('upload').onchange = e=>{
 const file = e.target.files[0];
 const url = URL.createObjectURL(file);

 if(file.type.startsWith('video')){
   const video = document.createElement('video');
   video.src = url;
   video.autoplay = true;
   video.loop = true;
   video.muted = true;
   video.onloadeddata = ()=>{
     resize(video.videoWidth, video.videoHeight);
     sourceNode = seriously.source(video);
     rebuild();
   };
 } else {
   const img = new Image();
   img.src = url;
   img.onload = ()=>{
     resize(img.width, img.height);
     sourceNode = seriously.source(img);
     rebuild();
   };
 }
};

function rebuild(){
 let input = sourceNode;
 chain.forEach(n=>{
   n.node.source = input;
   input = n.node;
 });
 target.source = input;
 seriously.go();
}

function createControl(input, key, info, node){
 let el;
 if(info.type === 'number'){
   el = document.createElement('input');
   el.type='range';
   el.min=info.min||0;
   el.max=info.max||1;
   el.step=info.step||0.01;
   el.value=info.defaultValue||0;
   el.oninput=()=>node[key]=parseFloat(el.value);
 }
 if(info.type === 'boolean'){
   el = document.createElement('input');
   el.type='checkbox';
   el.onchange=()=>node[key]=el.checked;
 }
 if(info.type === 'color'){
   el = document.createElement('input');
   el.type='color';
   el.oninput=()=>node[key]=el.value;
 }
 if(info.type === 'enum'){
   el = document.createElement('select');
   info.options.forEach(o=>{
     let opt=document.createElement('option');
     opt.value=o;
     opt.textContent=o;
     el.appendChild(opt);
   });
   el.onchange=()=>node[key]=el.value;
 }
 if(el){
   input.appendChild(document.createTextNode(key));
   input.appendChild(el);
 }
}

document.getElementById('addEffect').onclick=()=>{
 const list = Object.keys(Seriously.effects);
 const name = list[Math.floor(Math.random()*list.length)];
 const node = seriously.effect(name);

 const wrapper = document.createElement('div');
 wrapper.className='effect';

 const title = document.createElement('div');
 title.textContent=name;
 wrapper.appendChild(title);

 const remove = document.createElement('button');
 remove.textContent='Remove';
 remove.onclick=()=>{
   chain = chain.filter(e=>e.node!==node);
   wrapper.remove();
   rebuild();
 };
 wrapper.appendChild(remove);

 const inputs = node.inputs;
 for(let k in inputs){
   createControl(wrapper,k,inputs[k],node);
 }

 document.getElementById('effects').appendChild(wrapper);

 chain.push({node,ui:wrapper});
 rebuild();
};

document.getElementById('exportImg').onclick=()=>{
 const link = document.createElement('a');
 link.download='output.png';
 link.href=canvas.toDataURL();
 link.click();
};

document.getElementById('exportWebm').onclick=()=>{
 const stream = canvas.captureStream(30);
 const rec = new MediaRecorder(stream);
 let chunks=[];
 rec.ondataavailable=e=>chunks.push(e.data);
 rec.onstop=()=>{
   const blob=new Blob(chunks,{type:'video/webm'});
   const url=URL.createObjectURL(blob);
   const a=document.createElement('a');
   a.href=url;
   a.download='output.webm';
   a.click();
 };
 rec.start();
 setTimeout(()=>rec.stop(),5000);
};
</script>

</body>
</html>

<body>

<div id="ui">
<input type="file" id="upload" accept="image/*,video/*">
<select id="effects"></select>
<button id="add">Add Effect</button>
<button id="remove">Remove Last</button>
<button id="exportImg">Export Image</button>
<button id="exportVid">Export WebM</button>
<div id="controls"></div>
</div>

<div id="preview">
<canvas id="canvas"></canvas>
<video id="video" autoplay loop muted style="display:none"></video>
<img id="image" style="display:none">
</div>

<script>
var seriously=new Seriously();
var source=null;
var target=seriously.target('#canvas');
var nodes=[];

var effectsList=Object.keys(Seriously.effects());
var select=document.getElementById('effects');
effectsList.forEach(function(e){
var o=document.createElement('option');
o.value=e;o.textContent=e;
select.appendChild(o);
});

document.getElementById('upload').onchange=function(e){
var file=e.target.files[0];
var url=URL.createObjectURL(file);
if(file.type.startsWith('video')){
var v=document.getElementById('video');
v.src=url;v.style.display='block';
document.getElementById('image').style.display='none';
source=seriously.source(v);
}else{
var i=document.getElementById('image');
i.src=url;i.style.display='block';
document.getElementById('video').style.display='none';
source=seriously.source(i);
}
rebuild();
};

document.getElementById('add').onclick=function(){
var fx=seriously.effect(select.value);
nodes.push(fx);
rebuild();
createControls(fx);
};

document.getElementById('remove').onclick=function(){
nodes.pop();
rebuild();
document.getElementById('controls').innerHTML='';
nodes.forEach(createControls);
};

function rebuild(){
if(!source)return;
var current=source;
nodes.forEach(function(n){
n.source=current;
current=n;
});
target.source=current;
seriously.go();
}

function createControls(node){
var defs=node.inputs;
var container=document.getElementById('controls');
var wrap=document.createElement('div');

Object.keys(defs).forEach(function(k){
var d=defs[k];
var input;

if(d.type==='number' || d.type==='float'){
input=document.createElement('input');
input.type='range';
input.min=d.min||0;
input.max=d.max||1;
input.step=d.step||0.01;
input.value=node[k];
input.oninput=function(){node[k]=parseFloat(this.value)};
}

if(d.type==='boolean'){
input=document.createElement('input');
input.type='checkbox';
input.checked=node[k];
input.onchange=function(){node[k]=this.checked};
}

if(d.type==='enum'){
input=document.createElement('select');
d.options.forEach(function(o){
var opt=document.createElement('option');
opt.value=o;opt.textContent=o;
input.appendChild(opt);
});
input.value=node[k];
input.onchange=function(){node[k]=this.value};
}

if(d.type==='color'){
input=document.createElement('input');
input.type='color';
input.value='#ffffff';
input.oninput=function(){node[k]=this.value};
}

if(input){
var label=document.createElement('label');
label.textContent=k;
wrap.appendChild(label);
wrap.appendChild(input);
}
});

container.appendChild(wrap);
}

document.getElementById('exportImg').onclick=function(){
var link=document.createElement('a');
link.download='image.png';
link.href=document.getElementById('canvas').toDataURL();
link.click();
};

document.getElementById('exportVid').onclick=function(){
var canvas=document.getElementById('canvas');
var stream=canvas.captureStream();
var rec=new MediaRecorder(stream,{mimeType:'video/webm'});
var chunks=[];
rec.ondataavailable=function(e){chunks.push(e.data)};
rec.onstop=function(){
var blob=new Blob(chunks,{type:'video/webm'});
var url=URL.createObjectURL(blob);
var a=document.createElement('a');
a.href=url;
a.download='video.webm';
a.click();
};
rec.start();
setTimeout(function(){rec.stop()},5000);
};
</script>

</body>
</html>
